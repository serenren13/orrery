<html>
<head>

    <script src="https://www.cs.unm.edu/~angel/WebGL/7E/Common/initShaders.js" defer></script>
    <script src="https://www.cs.unm.edu/~angel/WebGL/7E/Common/MV.js" defer></script>

    <script src="listeners.js" defer></script>

<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="hud-left">
        <div class="hud-title">ORRERY</div>
        <div class="hud-badge">RAW WEBGL</div>

        <div class="hud-section">— EARTH ORBIT</div>

        <div class="hud-row">
            <div class="hud-label-row">
                <span class="hud-lbl">SPEED</span>
                <span class="hud-val" id="os_crd">3.0</span>
            </div>
            <input type="range" id="os" min="0" max="10" step="0.1" value="3">
        </div>

        <div class="hud-row">
            <div class="hud-label-row">
                <span class="hud-lbl">DISTANCE</span>
                <span class="hud-val" id="od_crd">1.0</span>
            </div>
            <input type="range" id="od" min="1.0" max="2.0" step="0.05" value="1.0">
        </div>

        <div class="hud-row">
            <div class="hud-label-row">
                <span class="hud-lbl">ANGLE</span>
                <span class="hud-val" id="oa_crd">0°</span>
            </div>
            <input type="range" id="oa" min="0" max="45" step="1" value="0">
        </div>

        <button class="hud-reset" id="reset_ss">reset orbit</button>

        <div class="hud-section">— CAMERA</div>

        <div class="hud-row">
            <div class="hud-label-row">
                <span class="hud-lbl red">X</span>
                <span class="hud-val red" id="x_crd">0.00</span>
            </div>
            <input type="range" id="xt" min="-1" max="1" step="0.01" value="0.0">
        </div>

        <div class="hud-row">
            <div class="hud-label-row">
                <span class="hud-lbl green">Y</span>
                <span class="hud-val green" id="y_crd">0.00</span>
            </div>
            <input type="range" id="yt" min="-1" max="1" step="0.01" value="0.0">
        </div>

        <div class="hud-row">
            <div class="hud-label-row">
                <span class="hud-lbl blue">Z</span>
                <span class="hud-val blue" id="z_crd">1.00</span>
            </div>
            <input type="range" id="zt" min="-1" max="1" step="0.01" value="1.0">
        </div>

        <div class="hud-row">
            <div class="hud-label-row">
                <span class="hud-lbl">FOV</span>
                <span class="hud-val" id="fovy">85°</span>
            </div>
            <input type="range" id="fov" min="10" max="100" step="1" value="85">
        </div>

        <button class="hud-reset" id="reset_cl">reset camera</button>
    </div>

    <div class="hud-right" id="info-card">
        <div class="info-header">
            <div class="info-dot" id="info-dot"></div>
            <div>
                <div class="info-name">EARTH</div>
                <div class="info-sub">third planet · sol system</div>
            </div>
        </div>
        <div class="info-row">
            <span class="info-key">ORBIT ANGLE</span>
            <span class="info-val live" id="live-angle">0.00 rad</span>
        </div>
        <div class="info-row">
            <span class="info-key">POSITION X</span>
            <span class="info-val live" id="live-x">0.00</span>
        </div>
        <div class="info-row">
            <span class="info-key">POSITION Z</span>
            <span class="info-val live" id="live-z">0.00</span>
        </div>
        <div class="info-row">
            <span class="info-key">LIGHT MODEL</span>
            <span class="info-val">phong</span>
        </div>
        <div class="info-row">
            <span class="info-key">SHININESS</span>
            <span class="info-val">800.0</span>
        </div>
    </div>

</body>
<script id="vertex-shader" type="x-shader/x-vertex">
    precision mediump float;
    attribute vec4 vertex;
    attribute vec4 normal;
    attribute vec2 texCoord;
    uniform mat4 V;
    uniform mat4 P;
    uniform vec4 light;
    uniform vec3 eye;
    uniform vec4 trans;
    uniform vec4 props;
    uniform int shading_enabled;
    varying vec3 N, L, E;
    varying vec2 fTexCoord;

    void main() {
      vec3 pos = vertex.xyz * props.w;
      float c = cos(props.y);
      float s = sin(props.y);
      mat4 ry = mat4(
        vec4(c, 0.0, s, 0.0),
        vec4(0.0, 1.0, 0.0, 0.0),
        vec4(-s, 0.0, c, 0.0),
        vec4(0.0, 0.0, 0.0, 1.0)
      );
      mat4 translate = mat4(
        vec4(1.0, 0.0, 0.0, 0.0),
        vec4(0.0, 1.0, 0.0, 0.0),
        vec4(0.0, 0.0, 1.0, 0.0),
        vec4(trans.x, trans.y, trans.z, 1.0)
      );
      vec4 position = translate * ry * vec4(pos, 1.0);
      vec3 v_p = -(P * V * position).xyz;
      vec3 v_l = light.xyz;
      vec3 v_n = (ry * normal).xyz;
      L = normalize(v_l - v_p);
      E = -eye;
      N = normalize(v_n);
      fTexCoord = texCoord;
      gl_Position = P * V * position;
    }
</script>
<script id="fragment-shader" type="x-shader/x-fragment">
    precision mediump float;
    precision lowp int;
    uniform sampler2D textureSampler;
    uniform int shading_enabled;
    uniform vec4 color;
    uniform float u_alpha;
    varying vec3 N, L, E;
    varying vec2 fTexCoord;
    float shininess = 800.0;
    vec4 kd = vec4(0.9, 0.9, 0.9, 1.0);
    vec4 ka = vec4(0.2, 0.2, 0.2, 1.0);

    void main() {
      vec4 texColor = texture2D(textureSampler, fTexCoord);
      if (shading_enabled == 0) {
        gl_FragColor = vec4(texColor.rgb, texColor.a * u_alpha);
      } else {
        vec3 H = normalize(L + E);
        float diffuseFactor = max(dot(L, N), 0.0);
        vec4 diffuse = kd * texColor * diffuseFactor;
        vec4 ambient = ka * texColor;
        float specularFactor = pow(max(dot(N, H), 0.0), shininess);
        vec4 specular = vec4(specularFactor, specularFactor, specularFactor, 1.0);
        if (dot(L, N) < 0.0) {
          specular = vec4(0.0, 0.0, 0.0, 1.0);
        }
        gl_FragColor = vec4((diffuse + ambient + specular).rgb, u_alpha);
      }
    }
</script>
</html>
